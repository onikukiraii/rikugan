version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

brews:
  - repository:
      owner: onikukiraii
      name: homebrew-rikugan
    homepage: "https://github.com/onikukiraii/rikugan"
    description: "TUI diff reviewer for AI prompts"
    license: "MIT"

archives:
  - format: tar.gz

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
